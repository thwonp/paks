name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout paks
        uses: actions/checkout@v4
        with:
          path: opencode/git/paks

      - name: Clone NextUI
        run: git clone --depth 1 https://github.com/LoveRetro/NextUI.git opencode/NextUI

      - name: Create output dir
        run: mkdir -p opencode/git/paks/bin/tg5040

      - name: Pull toolchain image
        run: docker pull ghcr.io/loveretro/tg5040-toolchain:latest

      - name: Build libmsettings.so
        run: |
          WS=$GITHUB_WORKSPACE
          docker run --rm \
            -v "$WS:$WS" \
            ghcr.io/loveretro/tg5040-toolchain:latest \
            sh -c '
              cd '"$WS"'/opencode/NextUI/workspace/tg5040/libmsettings
              ${CROSS_COMPILE}gcc -c -fpic msettings.c
              ${CROSS_COMPILE}gcc -shared -o libmsettings.so msettings.o -ltinyalsa -ldl -lrt
              cp libmsettings.so '"$WS"'/opencode/git/paks/bin/tg5040/
            '

      - name: Build plexmusic.elf
        run: |
          WS=$GITHUB_WORKSPACE
          docker run --rm \
            -v "$WS:$WS" \
            ghcr.io/loveretro/tg5040-toolchain:latest \
            sh -c 'cd '"$WS"'/opencode/git/paks/src && make 2>&1'

      - name: Package zip
        run: |
          mkdir -p staging/PlexMusic.pak
          mkdir -p staging/PlexMusic.pak/bin/tg5040
          cp opencode/git/paks/launch.sh staging/PlexMusic.pak/
          cp opencode/git/paks/pak.json staging/PlexMusic.pak/
          cp -r opencode/git/paks/res/ staging/PlexMusic.pak/res/
          cp opencode/git/paks/bin/tg5040/plexmusic.elf staging/PlexMusic.pak/bin/tg5040/
          cp opencode/git/paks/bin/tg5040/libmsettings.so staging/PlexMusic.pak/bin/tg5040/
          jq --arg v "$VERSION" '.version = $v' staging/PlexMusic.pak/pak.json > tmp.json && mv tmp.json staging/PlexMusic.pak/pak.json
          cd staging && zip -r "../PlexMusic.pak.zip" PlexMusic.pak/

      - name: Bump pak.json version in repo
        run: |
          jq --arg v "$VERSION" '.version = $v' opencode/git/paks/pak.json > tmp.json \
            && mv tmp.json opencode/git/paks/pak.json
          cd opencode/git/paks
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pak.json
          git commit -m "Bump PlexMusic version to $VERSION"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          PRERELEASE_FLAG=""
          [ "${{ github.event.inputs.prerelease }}" = "true" ] && PRERELEASE_FLAG="--prerelease"
          gh release create "$VERSION" \
            --title "PlexMusic $VERSION" \
            $PRERELEASE_FLAG \
            "PlexMusic.pak.zip"
